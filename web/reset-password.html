<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password — Seedling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=8">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            z-index: 1;
            position: relative;
        }
        .auth-card {
            background: var(--card-bg);
            border: 1px solid rgba(165,214,167,0.2);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-deep);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-width: 440px;
            width: 100%;
            text-align: center;
        }
        .form-group {
            text-align: left;
            margin-bottom: 24px;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--morning-dew);
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(165,214,167,0.2);
            border-radius: var(--radius-md);
            color: var(--text);
            font-family: var(--font-main);
            font-size: 1rem;
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--green);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 12px rgba(75,174,79,0.2);
        }
        .form-message {
            margin-top: 16px;
            font-size: 0.85rem;
            border-radius: 8px;
            padding: 10px;
            display: none;
        }
        .form-message.error {
            display: block;
            background: rgba(229,115,115,0.15);
            color: var(--error);
            border: 1px solid rgba(229,115,115,0.3);
        }
        .brand-logo {
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: -0.8px;
        }
        .brand-logo img {
            width: 44px;
            height: 44px;
            border-radius: 10px;
        }
        #submitBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="bg-mesh">
        <div class="mesh-orb orb-1"></div>
        <div class="mesh-orb orb-2"></div>
        <div class="mesh-orb orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-logo">
                <img src="assets/app_logo.png" alt="Seedling Logo">
                <span class="gradient-text">Seedling</span>
            </div>
            
            <h2 style="margin-bottom: 12px; font-weight: 800;">New Password</h2>
            <p style="font-size: 0.95rem; color: var(--text-sec); margin-bottom: 32px;">
                Enter a strong password to secure your growth in the forest.
            </p>

            <form id="resetForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Repeat password" required minlength="6">
                    </div>
                </div>

                <div id="formMessage" class="form-message"></div>

                <button type="submit" id="submitBtn" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 12px;">
                    Update Password
                </button>
            </form>
        </div>
    </div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    
    <script>
        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const formMessage = document.getElementById('formMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showMessage("Passwords do not match.", "error");
                return;
            }

            setLoading(true);

            try {
                const { error } = await window.supabaseClient.auth.updateUser({
                    password: password
                });

                if (error) {
                    showMessage(error.message, "error");
                    setLoading(false);
                } else {
                    // Success! Redirect to welcome/success page
                    window.location.href = 'welcome.html';
                }
            } catch (err) {
                showMessage("An unexpected error occurred.", "error");
                setLoading(false);
            }
        });

        function showMessage(text, type) {
            formMessage.textContent = text;
            formMessage.className = 'form-message ' + type;
            formMessage.style.display = 'block';
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            submitBtn.textContent = isLoading ? 'Updating...' : 'Update Password';
        }
    </script>
</body>
</html>
