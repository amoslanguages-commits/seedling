name: seedling
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.0
  in_app_purchase: ^3.2.0
  path: ^1.8.3
  flutter_riverpod: ^2.4.0
  supabase_flutter: ^2.0.0
  shared_preferences: ^2.2.0
  flutter_animate: ^4.3.0
  sqflite_common_ffi: ^2.4.0+2
  uuid: ^4.5.3
  twemoji: ^0.4.3
  csv: ^8.0.0
  audioplayers: ^6.6.0
  flutter_local_notifications: ^21.0.0
  confetti: ^0.8.0
  google_fonts: ^8.0.2
  url_launcher: ^6.2.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  fsrs: ^2.0.1
  path_provider: ^2.1.5
  flutter_dotenv: ^6.0.0
  sherpa_onnx: ^1.12.36
  http: ^1.6.0
  flutter_tts: ^4.2.5
  archive: ^4.0.9
  just_audio: ^0.9.42
  audio_service: ^0.18.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0b1910"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/sfx/
    - assets/database/
    - assets/grammar/
    - .env

flutter_native_splash:
  color: "#0b1910"
  image: "assets/icons/app_icon.png"
  android_12:
    color: "#0b1910"
    image: "assets/icons/app_icon.png"
    icon_background_color: "transparent"
  web: false
  fullscreen: true
